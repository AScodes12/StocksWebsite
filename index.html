<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Raspberry Pi Stock Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0c0e; --panel: #12141c; --text: #ffffff; --up: #00c805; --down: #ff3b30; }
        body { margin: 0; font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
        .grid { display: grid; grid-template-columns: 300px 1fr; gap: 24px; max-width: 1400px; margin: 0 auto; }
        .sidebar { background: var(--panel); border-radius: 16px; padding: 16px; height: fit-content; }
        .stock-item { display: flex; justify-content: space-between; padding: 14px; border-bottom: 1px solid #202430; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .stock-item:hover { background: rgba(255,255,255,0.05); }
        .up-text { color: var(--up); } .down-text { color: var(--down); }
        .main-panel { background: var(--panel); border-radius: 16px; padding: 32px; min-height: 500px; }
        .hidden { display: none; }
        .chart-box { height: 300px; margin-top: 24px; position: relative; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="sidebar">
            <h3 style="margin-top:0;">Pi Watchlist</h3>
            <div id="ticker-list">Connecting to Raspberry Pi...</div>
        </div>

        <div class="main-panel">
            <div id="empty-state"><h2>Select a stock to view live data from your Pi</h2></div>
            <div id="content-state" class="hidden">
                <h1 id="stock-title">Company Profile</h1>
                <h2 id="stock-price">$0.00</h2>
                <p id="stock-change">0.00%</p>
                <hr style="border-color:#202430;">
                <p id="stock-summary"></p>
                <div class="chart-box">
                    <canvas id="detailsChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // CHANGE THIS TO YOUR ACTIVE LOCALTUNNEL LINK EVERY TIME YOU RESTART IT
        const TUNNEL_URL = "https://cruel-sides-exist.loca.lt/api/stocks";

        let globalData = {};
        let activeChart = null;

        fetch(TUNNEL_URL)
            .then(res => res.json())
            .then(data => {
                globalData = data;
                renderWatchlist();
            }).catch(err => {
                document.getElementById('ticker-list').innerText = "Failed to connect to Pi tunnel.";
                console.error(err);
            });

        function renderWatchlist() {
            const container = document.getElementById('ticker-list');
            container.innerHTML = '';
            Object.values(globalData).forEach(stock => {
                const item = document.createElement('div');
                item.className = 'stock-item';
                item.onclick = () => showDetails(stock.symbol);
                item.innerHTML = `
                    <div><strong>${stock.symbol}</strong></div>
                    <div style="text-align:right;">
                        <div>${stock.price}</div>
                        <div class="${stock.is_positive ? 'up-text' : 'down-text'}">${stock.change}</div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function showDetails(symbol) {
            const stock = globalData[symbol];
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('content-state').classList.remove('hidden');
            
            document.getElementById('stock-title').innerText = `${stock.name} (${stock.symbol})`;
            document.getElementById('stock-price').innerText = stock.price;
            document.getElementById('stock-change').innerText = stock.change;
            document.getElementById('stock-change').className = stock.is_positive ? 'up-text' : 'down-text';
            document.getElementById('stock-summary').innerText = stock.summary;

            if (activeChart) activeChart.destroy();

            const ctx = document.getElementById('detailsChart').getContext('2d');
            activeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: stock.history_dates,
                    datasets: [{
                        label: 'Price (Past Month)',
                        data: stock.history_prices,
                        borderColor: stock.is_positive ? '#00c805' : '#ff3b30',
                        backgroundColor: 'rgba(255,255,255,0.01)',
                        tension: 0.2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
